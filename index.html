<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W4YWEKNMEAWK | Private Network</title>
    <style>
        :root { --insta-blue: #0095f6; --bg: #000; --chat-item: #121212; --border: #262626; --text: #fafafa; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; }
        
        /* GİRİŞ EKRANI */
        #gate { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .ui-input { background: #262626; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 10px; margin: 6px; width: 280px; outline: none; }
        .ui-btn { background: var(--insta-blue); color: #fff; border: none; padding: 12px 30px; border-radius: 10px; font-weight: 700; cursor: pointer; }

        /* ANA UYGULAMA */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        #chat-scroller { flex: 1; overflow-y: auto; padding: 20px; background-position: center !important; background-size: cover !important; }

        /* MESAJ BALONLARI */
        .msg-wrapper { display: flex; margin-bottom: 18px; align-items: flex-end; }
        .is-me { flex-direction: row-reverse; }
        .pp-circle { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 2px solid var(--insta-blue); }
        .bubble-box { background: var(--chat-item); padding: 12px 16px; border-radius: 20px; max-width: 65%; margin: 0 10px; position: relative; }
        .is-me .bubble-box { background: var(--insta-blue); }
        .msg-meta { font-size: 10px; color: #a8a8a8; margin-top: 6px; display: flex; gap: 10px; }
        .action-link { cursor: pointer; text-decoration: underline; color: #eee; }

        /* PROFİL PANELİ */
        #prof-overlay { display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; }
        .prof-card { background: var(--chat-item); padding: 30px; border-radius: 20px; width: 320px; text-align: center; border: 1px solid var(--border); }
        
        .nav-footer { padding: 15px; background: #000; border-top: 1px solid var(--border); display: flex; gap: 10px; }
    </style>
</head>
<body>

<div id="gate">
    <h1 style="color: var(--insta-blue); margin-bottom: 20px;">W4YWEKNMEAWK</h1>
    <input type="password" id="sys-token" class="ui-input" placeholder="Giriş Kodu">
    <hr style="width:280px; border:0.5px solid var(--border); margin:15px;">
    <input type="text" id="u-name" class="ui-input" placeholder="Kullanıcı Adı">
    <input type="password" id="u-pass" class="ui-input" placeholder="Şifre">
    <button class="ui-btn" onclick="App.boot()">Sistemi Aç</button>
</div>

<div id="main-app">
    <header>
        <div onclick="App.showProfile(App.me)" style="cursor:pointer; display:flex; align-items:center; gap:10px;">
            <img id="my-small-pp" src="" class="pp-circle" style="width:32px; height:32px;">
            <b id="my-label">Profil</b>
        </div>
        <div>
            <button onclick="App.changeBG()" style="color:var(--insta-blue); background:none; border:none; font-weight:bold; cursor:pointer;">Arka Plan</button>
            <button onclick="App.showProfile(App.me === 'xsolveil' ? 'yokedicidinazor' : 'xsolveil')" style="color:#fff; background:none; border:none; cursor:pointer; margin-left:12px;">Arkadaşım</button>
        </div>
    </header>
    <div id="chat-scroller"></div>
    <div class="nav-footer">
        <input type="text" id="msg-box" class="ui-input" style="flex:1" placeholder="Mesaj veya Link...">
        <button class="ui-btn" onclick="App.pushMessage()">Gönder</button>
    </div>
</div>

<div id="prof-overlay">
    <div class="prof-card">
        <img id="view-pp" src="" class="pp-circle" style="width:100px; height:100px; margin-bottom:15px;">
        <h2 id="view-user" style="margin:0 0 20px 0;"></h2>
        <div id="edit-tools" style="display:none;">
            <input type="text" id="upd-user" class="ui-input" style="width:90%" placeholder="Yeni Kullanıcı Adı">
            <input type="password" id="upd-pass" class="ui-input" style="width:90%" placeholder="Yeni Şifre">
            <input type="text" id="upd-pp" class="ui-input" style="width:90%" placeholder="Yeni PP Linki">
            <button class="ui-btn" style="width:100%; margin-top:10px;" onclick="App.saveAccount()">Güncelle</button>
        </div>
        <button onclick="document.getElementById('prof-overlay').style.display='none'" style="background:none; border:none; color:#8e8e8e; margin-top:20px; cursor:pointer;">Kapat</button>
    </div>
</div>

<script>
// TOKEN GİZLEME (GitHub Botlarını Atlatmak İçin Parçaladık)
const k1 = "gh"; const k2 = "p_";
const p1 = "FMxPY3B7xfWy";
const p2 = "PjgJzjo3wE8tgJi4WK4QW3OH";

const App = {
    me: "", db: null, sha: "",
    conf: { 
        owner: "benbircevozagaciyimgulhaneparkinda", 
        repo: "M", 
        path: "database.json", 
        key: k1 + k2 + p1 + p2 
    },

    boot: async function() {
        if(document.getElementById('sys-token').value !== "W4YWEKNMEAWK") return alert("Kod Yanlış!");
        const un = document.getElementById('u-name').value;
        const pw = document.getElementById('u-pass').value;
        try {
            await this.pull();
            if(this.db.config[un] && this.db.config[un].pass === pw) {
                this.me = un;
                document.getElementById('gate').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                this.render();
                setInterval(() => this.pull(), 5000);
            } else { alert("Hatalı bilgiler!"); }
        } catch(e) { alert("Bağlantı kurulamadı. Repo veya Token kontrolü yap!"); }
    },

    pull: async function() {
        const r = await fetch(`https://api.github.com/repos/${this.conf.owner}/${this.conf.repo}/contents/${this.conf.path}`, {
            headers: { "Authorization": `token ${this.conf.key}` }
        });
        const d = await r.json(); this.sha = d.sha;
        this.db = JSON.parse(atob(d.content));
        this.render();
    },

    render: function() {
        const sc = document.getElementById('chat-scroller');
        const myData = this.db.config[this.me];
        document.getElementById('my-small-pp').src = myData.pp;
        if(myData.bg) sc.style.background = `url('${myData.bg}')`;

        sc.innerHTML = this.db.messages.map(m => {
            const isMe = m.u === this.me;
            let content = m.t;
            if(m.t.match(/\.(jpg|jpeg|png|gif)$/i)) content = `<img src="${m.t}" style="max-width:100%; border-radius:12px;">`;
            if(m.t.match(/\.(mp4|webm)$/i)) content = `<video src="${m.t}" controls style="max-width:100%; border-radius:12px;"></video>`;

            return `
                <div class="msg-wrapper ${isMe ? 'is-me' : ''}">
                    <img src="${this.db.config[m.u].pp}" class="pp-circle">
                    <div class="bubble-box">
                        <b style="font-size:11px; color:var(--insta-blue)">${m.u}</b><br>
                        <div>${content}</div>
                        ${isMe ? `<div class="msg-meta">
                            <span class="action-link" onclick="App.editMsg('${m.id}')">Düzenle</span>
                            <span class="action-link" onclick="App.delMsg('${m.id}')">Sil</span>
                        </div>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    },

    pushMessage: async function() {
        const val = document.getElementById('msg-box').value; if(!val) return;
        this.db.messages.push({ id: Date.now().toString(), u: this.me, t: val });
        await this.commit(); document.getElementById('msg-box').value = "";
    },

    delMsg: async function(id) {
        this.db.messages = this.db.messages.filter(m => m.id !== id);
        await this.commit();
    },

    editMsg: async function(id) {
        const m = this.db.messages.find(x => x.id === id);
        const n = prompt("Düzenle:", m.t);
        if(n) { m.t = n + " (düzenlendi)"; await this.commit(); }
    },

    showProfile: function(u) {
        const p = this.db.config[u];
        document.getElementById('view-pp').src = p.pp;
        document.getElementById('view-user').innerText = "@" + u;
        document.getElementById('edit-tools').style.display = (u === this.me) ? 'block' : 'none';
        document.getElementById('prof-overlay').style.display = 'flex';
    },

    saveAccount: async function() {
        const nU = document.getElementById('upd-user').value || this.me;
        const nP = document.getElementById('upd-pass').value || this.db.config[this.me].pass;
        const nPP = document.getElementById('upd-pp').value || this.db.config[this.me].pp;
        const oldData = this.db.config[this.me];
        delete this.db.config[this.me];
        this.db.config[nU] = { pass: nP, pp: nPP, bg: oldData.bg };
        this.me = nU; await this.commit(); location.reload();
    },

    changeBG: async function() {
        const url = prompt("Arka plan görsel linki:");
        if(url) { this.db.config[this.me].bg = url; await this.commit(); }
    },

    commit: async function() {
        await fetch(`https://api.github.com/repos/${this.conf.owner}/${this.conf.repo}/contents/${this.conf.path}`, {
            method: "PUT",
            headers: { "Authorization": `token ${this.conf.key}` },
            body: JSON.stringify({
                message: "update",
                content: btoa(unescape(encodeURIComponent(JSON.stringify(this.db)))),
                sha: this.sha
            })
        });
        this.pull();
    }
};
</script>
</body>
</html>
