<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W4YWEKNMEAWK | Global Terminal</title>
    <style>
        :root { --blue: #0095f6; --bg: #000; --border: #262626; --panel: #121212; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* GİRİŞ PANELİ (HER ŞEY BURADA SORULUR) */
        #setup-screen { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 15px; width: 350px; text-align: center; z-index: 10; }
        .in { background: #262626; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; outline: none; font-size: 13px; }
        .btn { background: var(--blue); color: #fff; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        label { font-size: 10px; color: #888; display: block; text-align: left; margin-top: 5px; }

        /* ANA CHAT EKRANI */
        #app { display: none; position: fixed; inset: 0; background: #000; flex-direction: column; }
        header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #050505; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; background-size: cover !important; scroll-behavior: smooth; }

        /* MESAJLAR */
        .msg { display: flex; margin-bottom: 20px; align-items: flex-end; }
        .me { flex-direction: row-reverse; }
        .pp { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--blue); object-fit: cover; }
        .bubble { background: #262626; padding: 12px 16px; border-radius: 18px; max-width: 65%; margin: 0 10px; }
        .me .bubble { background: var(--blue); }
        .actions { font-size: 10px; color: #aaa; margin-top: 5px; display: flex; gap: 8px; cursor: pointer; }

        footer { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: #000; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h2 style="color:var(--blue); margin:0 0 15px 0;">SİSTEM KURULUMU</h2>
    
    <label>GITHUB ERİŞİM ANAHTARI</label>
    <input type="password" id="inp-token" class="in" placeholder="ghp_********************">
    
    <label>DEPO SAHİBİ (OWNER)</label>
    <input type="text" id="inp-owner" class="in" placeholder="Örn: benbircevozagaciyimgulhaneparkinda">
    
    <label>DEPO İSMİ (REPO)</label>
    <input type="text" id="inp-repo" class="in" placeholder="Örn: M">
    
    <label>VERİ DOSYASI (JSON)</label>
    <input type="text" id="inp-file" class="in" placeholder="Örn: database.json">
    
    <hr style="border: 0.1px solid #333; margin: 15px 0;">
    
    <label>KULLANICI ADINIZ</label>
    <input type="text" id="inp-user" class="in" placeholder="Örn: yokedicidinazor">
    
    <label>ŞİFRENİZ</label>
    <input type="password" id="inp-pass" class="in" placeholder="******">
    
    <button class="btn" onclick="System.boot()">SİSTEME BAĞLAN</button>
</div>

<div id="app">
    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img id="nav-pp" src="" class="pp" style="width:30px; height:30px;">
            <b id="nav-user"></b>
        </div>
        <button onclick="System.setBG()" style="background:none; border:none; color:var(--blue); font-weight:bold; cursor:pointer;">TEMA</button>
    </header>
    <div id="chat"></div>
    <footer>
        <input type="text" id="msg-input" class="in" style="margin:0; flex:1;" placeholder="Mesaj veya Link...">
        <button class="btn" style="width:auto; margin:0; padding:0 20px;" onclick="System.send()">GÖNDER</button>
    </footer>
</div>

<script>
const System = {
    config: {}, token: "", me: "", db: null, sha: "",

    boot: async function() {
        // Tüm bilgileri ekrandan al
        this.token = document.getElementById('inp-token').value;
        this.config = {
            owner: document.getElementById('inp-owner').value,
            repo: document.getElementById('inp-repo').value,
            file: document.getElementById('inp-file').value
        };
        const u = document.getElementById('inp-user').value;
        const p = document.getElementById('inp-pass').value;

        if(!this.token || !this.config.owner || !u) return alert("Lütfen tüm alanları doldurun!");

        try {
            const res = await fetch(`https://api.github.com/repos/${this.config.owner}/${this.config.repo}/contents/${this.config.file}`, {
                headers: { "Authorization": `token ${this.token}` }
            });
            
            if(!res.ok) throw new Error();

            const data = await res.json();
            this.sha = data.sha;
            this.db = JSON.parse(atob(data.content));

            // JSON içindeki kullanıcıyı ve şifreyi kontrol et
            if(this.db.config[u] && this.db.config[u].pass === p) {
                this.me = u;
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                this.render();
                setInterval(() => this.pull(), 5000);
            } else { alert("Giriş başarısız! JSON dosyasındaki bilgilerle eşleşmiyor."); }
        } catch(e) {
            alert("BAĞLANTI HATASI!\nBilgileri kontrol edin (Token, Repo, Dosya ismi vb.)");
        }
    },

    pull: async function() {
        const res = await fetch(`https://api.github.com/repos/${this.config.owner}/${this.config.repo}/contents/${this.config.file}?t=${Date.now()}`, {
            headers: { "Authorization": `token ${this.token}` }
        });
        const data = await res.json();
        this.sha = data.sha;
        this.db = JSON.parse(atob(data.content));
        this.render();
    },

    render: function() {
        const box = document.getElementById('chat');
        const myD = this.db.config[this.me];
        document.getElementById('nav-pp').src = myD.pp;
        document.getElementById('nav-user').innerText = "@" + this.me;
        if(myD.bg) box.style.background = `url('${myD.bg}') center/cover fixed`;

        box.innerHTML = this.db.messages.map(m => {
            const isMe = m.u === this.me;
            let val = m.t;
            if(m.t.match(/\.(jpg|jpeg|png|gif|webp)$/i)) val = `<img src="${m.t}" style="max-width:100%; border-radius:12px;">`;
            if(m.t.match(/\.(mp4|webm)$/i)) val = `<video src="${m.t}" controls style="max-width:100%; border-radius:12px;"></video>`;

            return `
                <div class="msg ${isMe ? 'me' : ''}">
                    <img src="${this.db.config[m.u].pp}" class="pp">
                    <div class="bubble">
                        <b style="font-size:10px; color:var(--blue)">${m.u}</b><br>${val}
                        ${isMe ? `<div class="actions">
                            <span onclick="System.edit('${m.id}')">Düzenle</span>
                            <span onclick="System.del('${m.id}')">Sil</span>
                        </div>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    },

    send: async function() {
        const inp = document.getElementById('msg-input');
        if(!inp.value) return;
        this.db.messages.push({ id: Date.now().toString(), u: this.me, t: inp.value });
        await this.push();
        inp.value = "";
    },

    del: async function(id) {
        if(!confirm("Silinsin mi?")) return;
        this.db.messages = this.db.messages.filter(x => x.id !== id);
        await this.push();
    },

    edit: async function(id) {
        const m = this.db.messages.find(x => x.id === id);
        const n = prompt("Düzenle:", m.t);
        if(n) { m.t = n + " (düzenlendi)"; await this.push(); }
    },

    setBG: async function() {
        const url = prompt("Arka plan linki:");
        if(url) { this.db.config[this.me].bg = url; await this.push(); }
    },

    push: async function() {
        await fetch(`https://api.github.com/repos/${this.config.owner}/${this.config.repo}/contents/${this.config.file}`, {
            method: "PUT",
            headers: { "Authorization": `token ${this.token}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                message: "update",
                content: btoa(unescape(encodeURIComponent(JSON.stringify(this.db)))),
                sha: this.sha
            })
        });
        this.pull();
    }
};
</script>
</body>
</html>
