<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>W4YWEKNMEAWK | Private Access</title>
    <style>
        :root { --blue: #0095f6; --bg: #000; --border: #262626; --card: #121212; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; }
        
        /* GİRİŞ EKRANI */
        #gate { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .panel { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 15px; width: 340px; text-align: center; }
        .in { background: #262626; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; margin: 8px 0; width: 100%; box-sizing: border-box; outline: none; }
        .btn { background: var(--blue); color: #fff; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .info-box { font-size: 11px; color: #555; background: #000; padding: 10px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #222; }

        /* ANA UYGULAMA */
        #app { display: none; height: 100vh; flex-direction: column; }
        header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); }
        #chat { flex: 1; overflow-y: auto; padding: 20px; background-size: cover !important; }

        /* MESAJLAR */
        .msg { display: flex; margin-bottom: 18px; align-items: flex-end; }
        .me { flex-direction: row-reverse; }
        .pp { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--blue); object-fit: cover; }
        .bubble { background: #262626; padding: 12px 16px; border-radius: 18px; max-width: 65%; margin: 0 10px; position: relative; }
        .me .bubble { background: var(--blue); }
        .msg-acts { font-size: 10px; color: #aaa; margin-top: 5px; display: flex; gap: 8px; cursor: pointer; }

        .footer { padding: 15px; background: #000; border-top: 1px solid var(--border); display: flex; gap: 10px; }
    </style>
</head>
<body>

<div id="gate">
    <div class="panel">
        <h2 style="color:var(--blue); margin:0 0 15px 0;">SİSTEME BAĞLAN</h2>
        
        <div class="info-box">
            Owner: benbircevozagaciyimgulhaneparkinda<br>
            Repo: M | File: database.json
        </div>

        <input type="password" id="g-token" class="in" placeholder="Bağlantı Anahtarı (ghp_...)">
        <hr style="border: 0.1px solid #333; margin: 15px 0;">
        <input type="text" id="u-name" class="in" placeholder="Kullanıcı Adı">
        <input type="password" id="u-pass" class="in" placeholder="Şifre">
        
        <button class="btn" onclick="Core.init()">GİRİŞ YAP</button>
    </div>
</div>

<div id="app">
    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img id="my-pp" src="" class="pp" style="width:30px; height:30px;">
            <b id="my-user"></b>
        </div>
        <button onclick="Core.setBG()" style="color:var(--blue); background:none; border:none; font-weight:bold; cursor:pointer;">ARKA PLAN</button>
    </header>
    <div id="chat"></div>
    <div class="footer">
        <input type="text" id="msg-in" class="in" style="margin:0; flex:1;" placeholder="Mesaj veya Medya Linki...">
        <button class="btn" style="width:auto; margin:0; padding:0 20px;" onclick="Core.send()">GÖNDER</button>
    </div>
</div>

<script>
const Core = {
    me: "", token: "", db: null, sha: "",
    // BURASI SENİN SABİT REPO BİLGİLERİN
    target: {
        owner: "benbircevozagaciyimgulhaneparkinda",
        repo: "M",
        path: "database.json"
    },

    init: async function() {
        this.token = document.getElementById('g-token').value;
        const un = document.getElementById('u-name').value;
        const pw = document.getElementById('u-pass').value;

        if(!this.token.startsWith("ghp_")) return alert("Hatalı Anahtar Biçimi!");

        try {
            const r = await fetch(`https://api.github.com/repos/${this.target.owner}/${this.target.repo}/contents/${this.target.path}`, {
                headers: { "Authorization": `token ${this.token}` }
            });
            
            if(!r.ok) throw new Error();

            const d = await r.json();
            this.sha = d.sha;
            this.db = JSON.parse(atob(d.content));

            if(this.db.config[un] && this.db.config[un].pass === pw) {
                this.me = un;
                document.getElementById('gate').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                this.render();
                setInterval(() => this.pull(), 5000);
            } else { alert("Kullanıcı adı veya şifre yanlış!"); }
        } catch(e) { 
            alert("BAĞLANTI BAŞARISIZ!\n\n1. Token yanlış veya yetkisiz.\n2. Repo ismi 'M' olduğundan emin ol.\n3. database.json dosyası repoda yok."); 
        }
    },

    pull: async function() {
        const r = await fetch(`https://api.github.com/repos/${this.target.owner}/${this.target.repo}/contents/${this.target.path}`, {
            headers: { "Authorization": `token ${this.token}` }
        });
        const d = await r.json(); this.sha = d.sha;
        this.db = JSON.parse(atob(d.content));
        this.render();
    },

    render: function() {
        const box = document.getElementById('chat');
        const myD = this.db.config[this.me];
        document.getElementById('my-pp').src = myD.pp;
        document.getElementById('my-user').innerText = "@" + this.me;
        if(myD.bg) box.style.background = `url('${myD.bg}') center/cover no-repeat fixed`;

        box.innerHTML = this.db.messages.map(m => {
            const isMe = m.u === this.me;
            let val = m.t;
            if(m.t.match(/\.(jpg|jpeg|png|gif)$/i)) val = `<img src="${m.t}" style="max-width:100%; border-radius:12px; border: 1px solid #333;">`;
            if(m.t.match(/\.(mp4|webm)$/i)) val = `<video src="${m.t}" controls style="max-width:100%; border-radius:12px;"></video>`;

            return `
                <div class="msg ${isMe ? 'me' : ''}">
                    <img src="${this.db.config[m.u].pp}" class="pp">
                    <div class="bubble">
                        <b style="font-size:10px; color:var(--blue)">${m.u}</b><br>${val}
                        ${isMe ? `<div class="msg-acts">
                            <span onclick="Core.edit('${m.id}')">Düzenle</span>
                            <span onclick="Core.del('${m.id}')">Sil</span>
                        </div>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    },

    send: async function() {
        const t = document.getElementById('msg-in').value; if(!t) return;
        this.db.messages.push({ id: Date.now().toString(), u: this.me, t: t });
        await this.push(); document.getElementById('msg-in').value = "";
    },

    del: async function(id) { 
        if(!confirm("Bu mesajı yok etmek istediğine emin misin?")) return;
        this.db.messages = this.db.messages.filter(x => x.id !== id); 
        await this.push(); 
    },
    
    edit: async function(id) {
        const m = this.db.messages.find(x => x.id === id);
        const n = prompt("Mesajı güncelle:", m.t);
        if(n) { m.t = n + " (düzenlendi)"; await this.push(); }
    },

    setBG: async function() {
        const url = prompt("Yeni arka plan resim linki:");
        if(url) { this.db.config[this.me].bg = url; await this.push(); }
    },

    push: async function() {
        const r = await fetch(`https://api.github.com/repos/${this.target.owner}/${this.target.repo}/contents/${this.target.path}`, {
            method: "PUT",
            headers: { "Authorization": `token ${this.token}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                message: "system update",
                content: btoa(unescape(encodeURIComponent(JSON.stringify(this.db)))),
                sha: this.sha
            })
        });
        if(r.ok) this.pull();
    }
};
</script>
</body>
</html>
