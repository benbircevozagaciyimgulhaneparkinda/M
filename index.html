<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W4YWEKNMEAWK | ULTIMATE V2</title>
    <style>
        :root { --blue: #0095f6; --bg: #000; --border: #262626; --panel: #121212; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* GİRİŞ VE AYARLAR PANELİ */
        #gate, #settings-modal { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 15px; width: 340px; text-align: center; z-index: 1000; }
        #settings-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid var(--blue); }
        
        .in { background: #262626; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; outline: none; font-size: 13px; }
        .btn { background: var(--blue); color: #fff; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* ANA UYGULAMA */
        #app { display: none; position: fixed; inset: 0; background: #000; flex-direction: column; }
        header { padding: 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #050505; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; background-size: cover !important; background-position: center !important; }

        .msg { display: flex; margin-bottom: 20px; align-items: flex-end; }
        .me { flex-direction: row-reverse; }
        .pp { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--blue); object-fit: cover; cursor: pointer; }
        .bubble { background: #262626; padding: 10px 15px; border-radius: 15px; max-width: 65%; margin: 0 10px; }
        .me .bubble { background: var(--blue); }
        .m-img { max-width: 100%; border-radius: 10px; margin-top: 5px; }

        footer { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: #000; align-items: center; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="gate">
    <h2 style="color:var(--blue); margin-bottom:15px;">SİSTEME GİRİŞ</h2>
    <input type="password" id="t-token" class="in" placeholder="GitHub Token">
    <input type="text" id="t-owner" class="in" placeholder="Owner (Cevo)">
    <input type="text" id="t-repo" class="in" placeholder="Repo (M)">
    <input type="text" id="t-file" class="in" placeholder="File (database.json)">
    <hr style="border:0.1px solid #333; margin:10px 0;">
    <input type="text" id="t-user" class="in" placeholder="Kullanıcı Adı">
    <input type="password" id="t-pass" class="in" placeholder="Şifre">
    <button class="btn" onclick="Core.boot()">BAĞLAN</button>
</div>

<div id="settings-modal">
    <h3 style="margin-top:0;">PROFİL AYARLARI</h3>
    <label style="font-size:11px; color:#888;">YENİ KULLANICI ADI</label>
    <input type="text" id="new-uname" class="in">
    <label style="font-size:11px; color:#888;">YENİ ŞİFRE</label>
    <input type="password" id="new-upass" class="in">
    <button class="btn" onclick="Core.updateProfile()">KAYDET VE GÜNCELLE</button>
    <button class="btn" style="background:#444;" onclick="document.getElementById('settings-modal').style.display='none'">İPTAL</button>
</div>

<div id="app">
    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <label for="f-pp"><img id="h-pp" src="" class="pp"></label>
            <input type="file" id="f-pp" accept="image/*" onchange="Core.upload(this, 'pp')">
            <b id="h-user" style="cursor:pointer;" onclick="Core.openSettings()">@...</b>
        </div>
        <label for="f-bg" style="font-size:12px; color:var(--blue); cursor:pointer;">TEMAYI DEĞİŞTİR</label>
        <input type="file" id="f-bg" accept="image/*" onchange="Core.upload(this, 'bg')">
    </header>
    
    <div id="chat"></div>

    <footer>
        <label style="font-size:20px; cursor:pointer;" for="f-chat">📷</label>
        <input type="file" id="f-chat" accept="image/*,video/*" onchange="Core.upload(this, 'chat')">
        <input type="text" id="m-input" class="in" style="margin:0; flex:1;" placeholder="Mesaj...">
        <button class="btn" style="width:auto; margin:0; padding:0 15px;" onclick="Core.sendText()">GÖNDER</button>
    </footer>
</div>

<script>
const Core = {
    conf: {}, token: "", me: "", db: null, sha: "",

    boot: async function() {
        this.token = document.getElementById('t-token').value;
        this.conf = { o: document.getElementById('t-owner').value, r: document.getElementById('t-repo').value, f: document.getElementById('t-file').value };
        this.me = document.getElementById('t-user').value.trim();
        const p = document.getElementById('t-pass').value;
        try {
            await this.pull();
            if(this.db.config[this.me] && this.db.config[this.me].pass === p) {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                this.render();
                setInterval(() => this.pull(), 5000);
            } else { alert("Hatalı Giriş!"); }
        } catch(e) { alert("Bağlantı Hatası!"); }
    },

    pull: async function() {
        const r = await fetch(`https://api.github.com/repos/${this.conf.o}/${this.conf.r}/contents/${this.conf.f}?t=${Date.now()}`, {
            headers: { "Authorization": `token ${this.token}` }
        });
        const d = await r.json(); this.sha = d.sha;
        this.db = JSON.parse(atob(d.content));
        this.render();
    },

    render: function() {
        const box = document.getElementById('chat');
        const my = this.db.config[this.me];
        document.getElementById('h-pp').src = my.pp || '';
        document.getElementById('h-user').innerText = "@" + this.me;
        if(my.bg) box.style.background = `url('${my.bg}') center/cover fixed`;

        box.innerHTML = this.db.messages.map(m => {
            const isMe = m.u === this.me;
            let val = m.t.startsWith('data:') ? (m.t.includes('video') ? `<video src="${m.t}" class="m-img" controls></video>` : `<img src="${m.t}" class="m-img">`) : m.t;
            return `
                <div class="msg ${isMe ? 'me' : ''}">
                    <img src="${this.db.config[m.u] ? this.db.config[m.u].pp : ''}" class="pp">
                    <div class="bubble">
                        <b style="font-size:10px; color:var(--blue)">${m.u}</b><br>${val}
                        ${isMe ? `<div style="font-size:9px; color:#888; margin-top:5px;"><span onclick="Core.del('${m.id}')">Sil</span></div>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    },

    openSettings: function() {
        document.getElementById('settings-modal').style.display = 'block';
        document.getElementById('new-uname').value = this.me;
        document.getElementById('new-upass').value = this.db.config[this.me].pass;
    },

    updateProfile: async function() {
        const newU = document.getElementById('new-uname').value.trim();
        const newP = document.getElementById('new-upass').value;
        if(!newU || !newP) return alert("Boş bırakamazsın!");

        // Eğer kullanıcı adı değişirse, config'deki eski ismi yeni isme taşıyoruz
        if(newU !== this.me) {
            this.db.config[newU] = this.db.config[this.me];
            delete this.db.config[this.me];
            // Mesajlardaki eski ismini de güncelle (isteğe bağlı, geçmişi korur)
            this.db.messages.forEach(m => { if(m.u === this.me) m.u = newU; });
        }
        this.db.config[newU].pass = newP;
        this.me = newU;
        await this.push();
        document.getElementById('settings-modal').style.display = 'none';
        alert("Profil Güncellendi!");
    },

    upload: function(input, type) {
        const f = input.files[0]; if(!f) return;
        const r = new FileReader();
        r.onloadend = async () => {
            if(type === 'chat') this.db.messages.push({ id: Date.now().toString(), u: this.me, t: r.result });
            else if(type === 'pp') this.db.config[this.me].pp = r.result;
            else if(type === 'bg') this.db.config[this.me].bg = r.result;
            await this.push();
        };
        r.readAsDataURL(f);
    },

    sendText: async function() {
        const i = document.getElementById('m-input'); if(!i.value) return;
        this.db.messages.push({ id: Date.now().toString(), u: this.me, t: i.value });
        await this.push(); i.value = "";
    },

    del: async function(id) {
        this.db.messages = this.db.messages.filter(x => x.id !== id);
        await this.push();
    },

    push: async function() {
        await fetch(`https://api.github.com/repos/${this.conf.o}/${this.conf.r}/contents/${this.conf.f}`, {
            method: "PUT",
            headers: { "Authorization": `token ${this.token}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: "up", content: btoa(unescape(encodeURIComponent(JSON.stringify(this.db)))), sha: this.sha })
        });
        this.pull();
    }
};
</script>
</body>
</html>
