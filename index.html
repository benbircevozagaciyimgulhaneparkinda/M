<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W4YWEKNMEAWK - Private Messenger</title>
    <style>
        :root { --main: #0095f6; --dark: #000; --card: #121212; --border: #262626; }
        body { background: var(--dark); color: white; font-family: -apple-system, sans-serif; margin: 0; }
        
        /* GİRİŞ SİSTEMİ */
        #gate { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .input-ui { background: #262626; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin: 5px; width: 280px; outline: none; }
        .btn-ui { background: var(--main); color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* ANA PANEL */
        #app { display: none; height: 100vh; flex-direction: column; }
        header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #000; }
        #chat-view { flex: 1; overflow-y: auto; padding: 20px; background-size: cover !important; }

        /* MESAJLAR */
        .msg-box { display: flex; margin-bottom: 20px; align-items: flex-start; }
        .my-msg { flex-direction: row-reverse; }
        .pp-img { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--main); object-fit: cover; }
        .bubble { background: #262626; padding: 12px 16px; border-radius: 18px; max-width: 65%; margin: 0 10px; position: relative; }
        .my-msg .bubble { background: var(--main); }
        .msg-actions { font-size: 10px; color: #8e8e8e; margin-top: 5px; display: flex; gap: 8px; cursor: pointer; }

        /* PROFİL MODAL */
        #profile-modal { display:none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 15px; z-index: 1000; text-align: center; width: 300px; }
        
        .footer { padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="gate">
    <h1 style="color: var(--main); letter-spacing: 2px;">SİSTEM ERİŞİMİ</h1>
    <input type="password" id="sys-key" class="input-ui" placeholder="Giriş Kodu (W4Y...)">
    <hr style="width: 280px; border: 0.5px solid var(--border);">
    <input type="text" id="login-user" class="input-ui" placeholder="Kullanıcı Adı">
    <input type="password" id="login-pass" class="input-ui" placeholder="Şifre">
    <button class="btn-ui" onclick="Core.init()">Sistemi Başlat</button>
</div>

<div id="app">
    <header>
        <div onclick="Core.openProfile(Core.me)" style="cursor:pointer; display:flex; align-items:center; gap:10px;">
            <img id="my-header-pp" src="" class="pp-img" style="width:30px; height:30px;">
            <span id="header-name">Profilim</span>
        </div>
        <div>
            <button onclick="Core.changeBG()" style="background:none; border:none; color:var(--main); cursor:pointer;">Arka Plan</button>
            <button onclick="Core.openProfile(Core.me === 'xsolveil' ? 'yokedicidinazor' : 'xsolveil')" style="background:none; border:none; color:white; cursor:pointer; margin-left:10px;">Arkadaşım</button>
        </div>
    </header>

    <div id="chat-view"></div>

    <div class="footer">
        <input type="text" id="msg-input" class="input-ui" style="flex:1" placeholder="Mesaj veya Medya Linki...">
        <button class="btn-ui" onclick="Core.send()">Gönder</button>
    </div>
</div>

<div id="profile-modal">
    <img id="prof-img" src="" class="pp-img" style="width:80px; height:80px;">
    <h2 id="prof-name"></h2>
    <div id="prof-edit-area" style="display:none;">
        <input type="text" id="new-name" class="input-ui" placeholder="Yeni Kullanıcı Adı">
        <input type="password" id="new-pass" class="input-ui" placeholder="Yeni Şifre">
        <input type="text" id="new-pp" class="input-ui" placeholder="Profil Foto URL">
        <button class="btn-ui" onclick="Core.updateAccount()">Güncelle</button>
    </div>
    <button onclick="document.getElementById('profile-modal').style.display='none'" style="margin-top:15px; color:red; background:none; border:none; cursor:pointer;">Kapat</button>
</div>

<script>
// TOKEN GÜVENLİĞİ (Sakin unutma: p1 + p2 senin gerçek tokenın olmalı)
const p1 = "ghp_FMxPY3B7xfWy"; 
const p2 = "PjgJzjo3wE8tgJi4WK4QW3OH"; 

const Core = {
    me: "",
    db: null,
    currentSha: "",
    config: { owner: "benbircevozagaciyimgulhaneparkinda", repo: "M", path: "database.json", token: p1 + p2 },

    init: async function() {
        const sys = document.getElementById('sys-key').value;
        const u = document.getElementById('login-user').value;
        const p = document.getElementById('login-pass').value;

        if(sys === "W4YWEKNMEAWK") {
            await this.sync(); // Verileri GitHub'dan çek
            if(this.db.config[u] && this.db.config[u].pass === p) {
                this.me = u;
                document.getElementById('gate').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                this.render();
                setInterval(() => this.sync(), 5000);
            } else { alert("Kullanıcı adı veya şifre hatalı!"); }
        } else { alert("Giriş kodu yanlış!"); }
    },

    sync: async function() {
        const res = await fetch(`https://api.github.com/repos/${this.config.owner}/${this.config.repo}/contents/${this.config.path}`, {
            headers: { "Authorization": `token ${this.config.token}` }
        });
        const data = await res.json();
        this.currentSha = data.sha;
        this.db = JSON.parse(atob(data.content));
        this.render();
    },

    render: function() {
        const box = document.getElementById('chat-view');
        const userData = this.db.config[this.me];
        document.getElementById('my-header-pp').src = userData.pp;
        if(userData.bg) box.style.background = `url('${userData.bg}')`;

        box.innerHTML = this.db.messages.map(m => {
            const isMe = m.u === this.me;
            // Medya Kontrolü (Link ise resim/video olarak göster)
            let content = m.t;
            if(m.t.includes(".jpg") || m.t.includes(".png") || m.t.includes(".gif")) content = `<img src="${m.t}" style="max-width:100%; border-radius:10px;">`;
            if(m.t.includes(".mp4")) content = `<video src="${m.t}" controls style="max-width:100%; border-radius:10px;"></video>`;

            return `
                <div class="msg-box ${isMe ? 'my-msg' : ''}">
                    <img src="${this.db.config[m.u].pp}" class="pp-img">
                    <div class="bubble">
                        <small style="color:var(--main); font-size:10px;">${m.u}</small><br>${content}
                        ${isMe ? `<div class="msg-actions">
                            <span onclick="Core.editMsg('${m.id}')">Düzenle</span>
                            <span onclick="Core.deleteMsg('${m.id}')">Sil</span>
                        </div>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    },

    send: async function() {
        const t = document.getElementById('msg-input').value;
        if(!t) return;
        const newMsg = { id: Date.now().toString(), u: this.me, t: t };
        this.db.messages.push(newMsg);
        await this.pushDB("Mesaj gönderildi");
        document.getElementById('msg-input').value = "";
    },

    deleteMsg: async function(id) {
        this.db.messages = this.db.messages.filter(m => m.id !== id);
        await this.pushDB("Mesaj silindi");
    },

    editMsg: async function(id) {
        const msg = this.db.messages.find(m => m.id === id);
        const yeni = prompt("Mesajı düzenle:", msg.t);
        if(yeni) {
            msg.t = yeni + " (düzenlendi)";
            await this.pushDB("Mesaj düzenlendi");
        }
    },

    openProfile: function(user) {
        const modal = document.getElementById('profile-modal');
        const data = this.db.config[user];
        document.getElementById('prof-img').src = data.pp;
        document.getElementById('prof-name').innerText = user;
        
        // Sadece kendi profili ise düzenleme kısmını aç
        document.getElementById('prof-edit-area').style.display = (user === this.me) ? 'block' : 'none';
        modal.style.display = 'block';
    },

    updateAccount: async function() {
        const newU = document.getElementById('new-name').value || this.me;
        const newP = document.getElementById('new-pass').value || this.db.config[this.me].pass;
        const newPP = document.getElementById('new-pp').value || this.db.config[this.me].pp;

        const oldData = this.db.config[this.me];
        delete this.db.config[this.me];
        this.db.config[newU] = { pass: newP, pp: newPP, bg: oldData.bg };
        this.me = newU;
        
        await this.pushDB("Hesap güncellendi");
        alert("Bilgiler güncellendi, sayfa yenilenebilir.");
    },

    changeBG: async function() {
        const url = prompt("Arka plan resim linki:");
        if(url) {
            this.db.config[this.me].bg = url;
            await this.pushDB("Arka plan değişti");
        }
    },

    pushDB: async function(log) {
        await fetch(`https://api.github.com/repos/${this.config.owner}/${this.config.repo}/contents/${this.config.path}`, {
            method: "PUT",
            headers: { "Authorization": `token ${this.config.token}` },
            body: JSON.stringify({
                message: log,
                content: btoa(unescape(encodeURIComponent(JSON.stringify(this.db)))),
                sha: this.currentSha
            })
        });
        this.sync();
    }
};
</script>
</body>
</html>
